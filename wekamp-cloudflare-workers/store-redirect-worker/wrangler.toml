name = "store-redirect-worker"
main = "src/index.js"
compatibility_date = "2026-04-30"
workers_dev = false

routes = [
  { pattern = "rbx-labs.io/open", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/chat/token", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/chat/ensure-user", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/chat/dm-channel-id", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/chat/group-channel-id", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/chat/broadcast-channel-id", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/chat/sync-profile", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/call/token", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/call/dm-id", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/call/group-id", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/healthz", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/u/*", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/c/*", zone_name = "rbx-labs.io" },
  { pattern = "rbx-labs.io/k/*", zone_name = "rbx-labs.io" },
]

[triggers]
crons = ["0 */12 * * *"]

[vars]
AUTH_VERIFY_URL = "https://api.kampd.com/user/v1/profile"
CHAT_CORS_ORIGIN = "https://rbx-labs.io"
STREAM_API_KEY = "sfa696yj7vrk"
USER_PROFILE_URL = "https://api.kampd.com/user/v1/profile"
RESEARCH_AGENT_TICK_URL = "https://api.kampd.com/ampy/agent/research/tick"
RESEARCH_AGENT_KAMP_ID = "69fcd01874e71bd714459277"
RESEARCH_AGENT_PERSONA_ID = "ecosystm_research_persona_v1"
RESEARCH_AGENT_MAX_THEMES = 5
RESEARCH_AGENT_DRY_RUN = false
RESEARCH_AGENT_AUTO_PUBLISH = true
